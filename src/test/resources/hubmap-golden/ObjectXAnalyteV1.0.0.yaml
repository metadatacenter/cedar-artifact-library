  status: draft
  version: 0.0.1
  modelVersion: 1.6.0
  prefLabel: Contributors path
  regex: ^(?:\.\/.*|\w.*)\.tsv$
  createdOn: '2025-01-13T09:54:42-08:00'
  createdBy: https://metadatacenter.org/users/70417c1c-ffa6-49b2-9ddf-e4a2d73fe1e9
