  modelVersion: 1.6.0
  prefLabel: Preamble
  content: |
    <p><span id="docs-internal-guid-9e25a493-7fff-c326-d1f2-f9133b01cdc2"><span style="font-size: 12pt; font-family: &quot;Times New Roman&quot;, serif; color: rgb(0, 0, 0); background-color: transparent; font-variant-numeric: normal; font-variant-east-asian: normal; font-variant-alternates: normal; font-variant-position: normal; font-variant-emoji: normal; vertical-align: baseline; white-space-collapse: preserve;">Characterizing environmental exposures is critical to understanding health across the lifespan. However, exposure-related data are often not FAIR (Findable, Accessible, Interoperable, Reusable), limiting their discoverability, integration, and reuse. This template provides a standardized structure for reporting exposure-related study information. It is designed to improve data transparency, harmonization, and reproducibility, aligning with HHEAR (Human Health Exposure Analysis Resource) controlled vocabularies where applicable and our own new exposure value set. Researchers should use drop-down menus to complete all fields wherever possible.</span></span></p>
