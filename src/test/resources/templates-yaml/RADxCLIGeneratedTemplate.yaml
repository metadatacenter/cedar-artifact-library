    description: If the creator is a person, the surname(s) of the creator (e.g., last name in Western languagues, first name in Asian languages).
    id: https://repo.metadatacenter.org/template-fields/fb0a04fe-49e7-4eac-93d6-f2424d4c0e55
    status: draft
    version: 0.0.1
    modelVersion: 1.6.0
    configuration:
      propertyIri: http://purl.org/radx-terms/metadata-terms/creatorFamilyName
  - key: Creator Identifier
    type: text-field
    name: Creator Identifier
    description: "Globally unique string that identifies the creator (an individual or legal entity). For individuals, this is typically an ORCID; for research organizations, it is typically an ROR.\n\nThe ORCID iD is an https IRI with a 16-digit number that is compatible with the ISO Standard (ISO 27729), also known as the International Standard Name Identifier (ISNI), e.g. https://orcid.org/0000-0001-2345-6789 \n\n_[ORCID](https://orcid.org) provides a persistent digital identifier (an ORCID iD) that distinguishes each researcher from every other researcher. You can connect your iD with your professional information—affiliations, grants, publications, peer review, and more. You can use your iD to share your information with other systems, ensuring you get recognition for all your contributions, saving you time and hassle, and reducing the risk of errors._\n\nThe ROR is an https IRI that uniquely identifies most research organizatiions. \n\n_The [Research Organization Registry (ROR)](https://ror.org) is a community-led project to develop an open, sustainable, usable, and unique identifier for every research organization in the world._"
    id: https://repo.metadatacenter.org/template-fields/e293f7a8-f095-46ce-9835-f6a0eccbb647
    status: draft
    version: 0.0.1
    modelVersion: 1.6.0
