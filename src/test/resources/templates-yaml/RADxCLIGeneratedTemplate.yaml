- key: Data File Identity
  type: element
  name: Data File Identity
  description: Information used to identify the Data File being described.
  id: https://repo.metadatacenter.org/template-elements/2bf394ff-5490-497d-8ce2-43d5fb7510d3
  status: draft
  version: 0.0.1
  modelVersion: 1.6.0
  children:
  - key: Identifier
    type: text-field
    name: Identifier
    description: |-
      A globally unique string that identifies the Data File being described. It is typically a DOI (Digital Object Identifier) or IRI (International Resource Identifier, or Web address). The identifier is typically generated by data providers or data publishers who wish to have a citable and Web-accessible resource.

      Example DOIs are `doi:10.1000/182` or `https://doi.org/10.1000/182`, both of which identify the DOI Handbook, which has a DOI of 10.1000/182

      See also:  [https://en.wikipedia.org/wiki/Digital_object_identifier](https://en.wikipedia.org/wiki/Digital_object_identifier)
    id: https://repo.metadatacenter.org/template-fields/2816a842-91cd-4b22-97b6-46fd18326450
    status: draft
    version: 0.0.1
    modelVersion: 1.6.0
    configuration:
      propertyIri: http://purl.org/radx-terms/metadata-terms/identifier
  - key: Identifier Type
    type: controlled-term-field
    name: Identifier Type
    description: "The identifier type used to identify the resource being described.\n\nThis need not be provided if the identifier is either a DOI that begins with \"doi:\" or \"https://doi.org/\", or it is an IRI that begins with either \"http://\" or \"https://\" "
    id: https://repo.metadatacenter.org/template-fields/31428b54-12db-4de1-bc48-983f18bd0090
    status: draft
    version: 0.0.1
    modelVersion: 1.6.0
    datatype: iri
    values:
    - type: branch
      ontologyName: https://bioportal.bioontology.org/ontologies/FDC-GDMT
      acronym: FDC-GDMT
      termLabel: FDC-GDMT
      iri: http://vocab.fairdatacollective.org/gdmt/IdentifierType
      maxDepth: 2147483647
    configuration:
      propertyIri: http://purl.org/radx-terms/metadata-terms/identifierType
  - key: File Name
    type: text-field
    name: File Name
    description: The local name of the resource (for example, in a file-based operating system or web service).
    id: https://repo.metadatacenter.org/template-fields/e3f42f66-2b56-4a3c-a882-a1de5ffbb9cd
    status: draft
    version: 0.0.1
    modelVersion: 1.6.0
    configuration:
      propertyIri: http://purl.org/radx-terms/metadata-terms/fileName
  - key: Version
    type: text-field
    name: Version
    description: |-
      The string identifying the version of the data file or other resource being described.

      This field accepts any version string, but we suggest that you use semantic versioning of the form `major.minor.patch`. for example, `2.1.4`.
    id: https://repo.metadatacenter.org/template-fields/d0b270eb-afc1-4657-bd86-06dc1576cc01
    status: draft
    version: 0.0.1
    modelVersion: 1.6.0
    configuration:
      propertyIri: http://purl.org/radx-terms/metadata-terms/version
  - key: SHA256 digest
    type: text-field
    name: SHA256 digest
    description: "A SHA256 digest of the Data File contents. This is a 64 characters long hexadecimal string. \n\nFor example, the SHA256 digest of the string, \"RADx Data Hub\" is `ebff8d3da88b292622d3bfc36bdac4c4537ddc56cb07f344c5223d6b6f9cd011`.\n\nOn macOS the following command may be used to generate the SHA256 digest of a file.\n\n```\nshasum -a 256 /path/to/file\n```"
    id: https://repo.metadatacenter.org/template-fields/8c2efda3-36ec-40a4-8a71-7de846e93d82
    status: draft
    version: 0.0.1
    modelVersion: 1.6.0
    configuration:
      propertyIri: https://purl.org/radx-terms/sha256
  configuration:
    propertyIri: http://purl.org/radx-terms/metadata-terms/identityDescriptor
