- key: Data File Titles
  type: element
  name: Data File Titles
  description: A list of names or titles of the Data File being described. At least one Data File Title is required.  Mutliple values may be specified to provide titles in different languages.
  id: https://repo.metadatacenter.org/template-elements/9424deb4-f386-4d6a-b7ad-cdab7239205f
  status: draft
  version: 0.0.1
  modelVersion: 1.6.0
  children:
  - key: Title
    type: text-field
    name: Title
    description: |-
      A title or descriptive name by which the Data File being described is known. This is a presentation name (i.e. title case with appropriate spacing) and is typically different from the actual file name of the data file.

      Multiple titles and different languages may be specified by repeating this element. The language for a given title is specified with the Language field.
    id: https://repo.metadatacenter.org/template-fields/ae10d0fa-e2c8-4536-b9ea-d3fb4408b9c7
    status: draft
    version: 0.0.1
    modelVersion: 1.6.0
    configuration:
      required: true
      propertyIri: http://purl.org/radx-terms/metadata-terms/title
  - key: Language
    type: single-select-list-field
    name: Language
    description: The language tag that identifies the language in which the Data File Title is provided. Languages are identified using codes that are structured in accordance with [RFC 5646](https://www.rfc-editor.org/rfc/rfc5646). If no value is specified then the default code of `en` for English is assumed.
    identifier: language
    id: https://repo.metadatacenter.org/template-fields/6c194ebc-eff5-4490-876c-e46ba9e0bcc1
