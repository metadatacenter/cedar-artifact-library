- key: Data File Temporal Coverage
  type: element
  name: Data File Temporal Coverage
  description: A list of temporal descriptions that specify the temporal coverage of the data contained within the data file associated with this metadata.
  id: https://repo.metadatacenter.org/template-elements/be8f8a7f-2371-4716-8a12-7bada3afb0b0
  status: draft
  version: 0.0.1
  modelVersion: 1.6.0
  children:
  - key: Temporal Extent Minimum Value
    type: temporal-field
    name: Temporal Extent Minimum Value
    description: |-
      The start date (and optionally time) of the data.

      Note that dates must be specified in [ISO-8601](https://en.wikipedia.org/wiki/ISO_8601) format. This format specifies date/times in a locale neutral way with temporal components ordered largest to smallest, for example year, month, day. Note that times are in 24 hour clock (military time) format, thus 13:43 is 1:43pm. When times are specified a time zone must also be specified (Z or +00:00 indicates Greenwich Mean Time).

      The date time 2022-11-23T01:23:45.678-07:00 specifies November 23, 2022 at just past 1:23am Pacific Daylight Time. Hyphens and colons are optional.

      The date 2022-09-23 specifies September 23, 2022 (without a time stamp). Dates are assumed GMT if no time zone is specified.
    id: https://repo.metadatacenter.org/template-fields/ddf3cffe-4dbd-4784-8651-19409da131fd
    status: draft
    version: 0.0.1
    modelVersion: 1.6.0
    datatype: xsd:date
    granularity: day
    configuration:
      propertyIri: https://w3id.org/radx/radmo/temporalExtentMinimumValue
  - key: Temporal Extent Maximum Value
    type: temporal-field
    name: Temporal Extent Maximum Value
    description: |-
      The end date (and optionally time) of the data.

      Note that dates must be specified in [ISO-8601](https://en.wikipedia.org/wiki/ISO_8601) format. This format specifies date/times in a locale neutral way with temporal components ordered largest to smallest, for example year, month, day. Note that times are in 24 hour clock (military time) format, thus 13:43 is 1:43pm. When times are specified a time zone must also be specified (Z or +00:00 indicates Greenwich Mean Time).

      The date time 2022-11-23T01:23:45.678-07:00 specifies November 23, 2022 at just past 1:23am Pacific Daylight Time. Hyphens and colons are optional.

      The date 2022-09-23 specifies September 23, 2022 (without a time stamp). Dates are assumed GMT if no time zone is specified.
    id: https://repo.metadatacenter.org/template-fields/2682b68a-23e9-4de6-93ca-7b7ad6bd02f3
    status: draft
    version: 0.0.1
    modelVersion: 1.6.0
    datatype: xsd:date
    granularity: day
    configuration:
      propertyIri: https://w3id.org/radx/radmo/temporalExtentMaximumValue
  - key: Temporal Resolution
    type: text-field
    name: Temporal Resolution
    description: |-
      The nominal time interval between the measurement time of one data record and that of the following data record, in seconds. Measurement time can be considered as the beginning, end, or other known point in the measurement process.

      Most repeating measurement processes have some variation in the interval between measurements. If there is no planned schedule for the measurements, this value can be set to 0.
    id: https://repo.metadatacenter.org/template-fields/2ca06bd9-8cd8-4b27-bac0-94d03b1f2e07
    status: draft
    version: 0.0.1
    modelVersion: 1.6.0
    configuration:
      propertyIri: https://w3id.org/radx/radmo/temporalResolution
  - key: Duration
    type: text-field
    name: Duration
    description: |-
      The total duration of data temporal coverage, specified in in [ISO-8601](https://en.wikipedia.org/wiki/ISO_8601) duration format.

      P is the duration designator (for period) placed at the start of the duration representation.
      - Y is the year designator that follows the value for the number of calendar years.
      - M is the month designator that follows the value for the number of calendar months.
      - W is the week designator that follows the value for the number of weeks.
      - D is the day designator that follows the value for the number of calendar days.
      T is the time designator that precedes the time components of the representation.
      - H is the hour designator that follows the value for the number of hours.
      - M is the minute designator that follows the value for the number of minutes.
      - S is the second designator that follows the value for the number of seconds.

      The duration format must begin with P, and include at least one designator and value; other designators may be dropped. The smallest designator may include a decimal fraction. For example, P8DT1.5H indicates a duration of 8 calendar days + 1.5 hours.
    id: https://repo.metadatacenter.org/template-fields/76650536-9a28-4d93-8fab-4aaae6d27650
    status: draft
    version: 0.0.1
    modelVersion: 1.6.0
    configuration:
      propertyIri: https://w3id.org/radx/radmo/temporalCoverageDuration
  configuration:
    propertyIri: https://w3id.org/radx/radmo/temporalCoverageDescriptor
    multiple: true
    minItems: 0
