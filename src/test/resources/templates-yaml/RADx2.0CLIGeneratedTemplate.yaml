    type: text-field
    name: Creator Family Name
    description: If the creator is a person, the surname(s) of the creator (e.g., last name in Western languagues, first name in Asian languages).
    id: https://repo.metadatacenter.org/template-fields/c5993e18-5770-414a-9bc3-79c1e10206ea
    status: draft
    version: 0.0.1
    modelVersion: 1.6.0
    configuration:
      propertyIri: https://w3id.org/radx/radmo/creatorFamilyName
  - key: Creator Identifier
    type: text-field
    name: Creator Identifier
    description: "Globally unique string that identifies the creator (an individual or legal entity). For individuals, this is typically an ORCID; for research organizations, it is typically an ROR.\n\nMultiple values may be specified for this field.  If more than one value is specified we recommend placing the preferred identifier first in the list.\n\nThe ORCID iD is an https IRI with a 16-digit number that is compatible with the ISO Standard (ISO 27729), also known as the International Standard Name Identifier (ISNI), e.g. https://orcid.org/0000-0001-2345-6789 \n\n_[ORCID](https://orcid.org) provides a persistent digital identifier (an ORCID iD) that distinguishes each researcher from every other researcher. You can connect your iD with your professional information—affiliations, grants, publications, peer review, and more. You can use your iD to share your information with other systems, ensuring you get recognition for all your contributions, saving you time and hassle, and reducing the risk of errors._\n\nThe ROR is an https IRI that uniquely identifies most research organizatiions. \n\n_The [Research Organization Registry (ROR)](https://ror.org) is a community-led project to develop an open, sustainable, usable, and unique identifier for every research organization in the world._"
    id: https://repo.metadatacenter.org/template-fields/270c56f5-a295-488e-a904-a7fa400e0818
    status: draft
    version: 0.0.1
    modelVersion: 1.6.0
    configuration:
      required: true
      propertyIri: https://w3id.org/radx/radmo/creatorIdentifier
      multiple: true
      minItems: 0
  - key: Creator Email
    type: email-field
    name: Creator Email
    description: The email address of the creator.
    id: https://repo.metadatacenter.org/template-fields/0b468f15-fc7f-4886-b461-1a9ef0cfdfff
    status: draft
    version: 0.0.1
    modelVersion: 1.6.0
    configuration:
      propertyIri: https://w3id.org/radx/radmo/creatorEmail
  - key: Creator Affiliation
    type: text-field
    name: Creator Affiliation
    description: If the creator is a Person who is affiliated with an instition then this field should specify the institution.
    id: https://repo.metadatacenter.org/template-fields/59a7daf6-c3e6-4e08-a03f-ba4d831e97bf
    status: draft
    version: 0.0.1
    modelVersion: 1.6.0
    configuration:
      propertyIri: https://w3id.org/radx/radmo/creatorAffiliation
  - key: Creator Affiliation Identifier
    type: text-field
    name: Creator Affiliation Identifier
    description: "Globally unique string that identifies the organizational affiliation of the contributor.  \n\nWe suggest that you an identifier from the [Research Organization Registry (ROR)](https://ror.org), a community-led project to develop an open, sustainable, usable, and unique identifier for every research organization in the world."
    id: https://repo.metadatacenter.org/template-fields/9e57377b-a28b-4a40-96c5-4a6200dc40a9
    status: draft
    version: 0.0.1
    modelVersion: 1.6.0
    configuration:
      propertyIri: https://w3id.org/radx/radmo/creatorAffiliationIdentifier
  - key: Creator Role
    type: controlled-term-field
