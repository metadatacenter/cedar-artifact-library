- key: Data File Dates
  type: element
  name: Data File Dates
  description: |-
    A list of relevant dates related to the data file being described. Such dates pertain to some data-file-related event, for example "creation date", "submission date" etc. Dates are specified as a pair containing the actual date (in ISO-8601 format) and the event that the date relates to. See individual fields for specific examples.

    The dates of some types of events can be captured by the RADx Data Hub, for example the "Submitted" date/time.
  id: https://repo.metadatacenter.org/template-elements/89f78bc9-abfb-4767-95a6-f03ffe9c7657
  status: draft
  version: 0.0.1
  modelVersion: 1.6.0
  children:
  - key: Event Type
    type: controlled-term-field
    name: Event Type
    description: Type of Data File event that the date is associated with. The Event Type is usually considered with respect to the corresponding actor; for example, Created is typically the initial creation of the Data File by its originator, Accepted is when an ingested Data File is approved (e.g., by the Data Hub), and Updated is the time of the most recent change to the Data File.
    id: https://repo.metadatacenter.org/template-fields/c05ebeee-ccdc-411b-9dfd-2bbaae61d79b
    status: draft
    version: 0.0.1
    modelVersion: 1.6.0
    datatype: iri
    values:
    - type: branch
      ontologyName: https://bioportal.bioontology.org/ontologies/GDMT
      acronym: GDMT
      termLabel: GDMT
      iri: https://w3id.org/gdmt/DateType
      maxDepth: 2147483647
    configuration:
      propertyIri: https://w3id.org/radx/radmo/eventType
  - key: Date
    type: temporal-field
    name: Date
    description: "The date/time that is specific to the associated event. \n\nNote that dates must be specified in [ISO-8601](https://en.wikipedia.org/wiki/ISO_8601) format. This format specifies date/times in a locale neutral way with temporal components ordered largest to smallest, for example year, month, day. Note that times are in 24 hour clock (military time) format, thus 13:43 is 1:43pm. When times are specified a time zone must also be specified (Z or +00:00 indicates Greenwich Mean Time).\n\nThe date time 2022-11-23T01:23:45.678-07:00 specifies November 23, 2022 at just past 1:23am Pacific Daylight Time. Hyphens and colons are optional.\n\nThe date 2022-09-23 specifies September 23, 2022 (without a time stamp). Dates are assumed GMT if no time zone is specified."
    id: https://repo.metadatacenter.org/template-fields/36993d6b-7678-4e0b-be7c-f813e5a32809
    status: draft
    version: 0.0.1
    modelVersion: 1.6.0
    datatype: xsd:date
    granularity: day
    configuration:
      propertyIri: https://w3id.org/radx/radmo/eventDate
  configuration:
    propertyIri: https://w3id.org/radx/radmo/eventsDescriptor
    multiple: true
    minItems: 0
