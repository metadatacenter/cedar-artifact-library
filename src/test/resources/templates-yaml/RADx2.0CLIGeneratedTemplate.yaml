children:
- key: File Name
  type: text-field
  name: File Name
  description: The local name of the resource (for example, in a file-based operating system or web service).
  id: https://repo.metadatacenter.org/template-fields/5ceebe68-3a3f-466a-844d-e91451aaad11
  status: draft
  version: 0.0.1
  modelVersion: 1.6.0
  configuration:
    required: true
    propertyIri: https://w3id.org/radx/radmo/fileName
- key: Title
  type: text-field
  language: en
  name: Title
  description: |-
    A title or descriptive name by which the Data File being described is known. This is a presentation name (i.e. title case with appropriate spacing) and is typically different from the actual file name of the data file.

    Multiple titles and different languages may be specified by repeating this element. The language for a given title is specified with the Language field.
  id: https://repo.metadatacenter.org/template-fields/c46fe191-8567-4598-9195-9db37f0a077a
  status: draft
  version: 0.0.1
  modelVersion: 1.6.0
  configuration:
    required: true
    propertyIri: https://w3id.org/radx/radmo/title
- key: Version
  type: text-field
  name: Version
  description: |-
    The string identifying the version of the data file or other resource being described.

    This field accepts any version string, but we suggest that you use semantic versioning of the form `major.minor.patch`. for example, `2.1.4`.
  id: https://repo.metadatacenter.org/template-fields/db2ec775-5e38-480b-bf66-c6e171969993
  status: draft
  version: 0.0.1
  modelVersion: 1.6.0
  configuration:
    required: true
    propertyIri: https://w3id.org/radx/radmo/version
- key: SHA256 digest
  type: text-field
  name: SHA256 digest
  description: "A SHA256 digest of the Data File contents. This is a 64 characters long hexadecimal string. \n\nFor example, the SHA256 digest of the string, \"RADx Data Hub\" is `ebff8d3da88b292622d3bfc36bdac4c4537ddc56cb07f344c5223d6b6f9cd011`.\n\nOn macOS the following command may be used to generate the SHA256 digest of a file.\n\n```\nshasum -a 256 /path/to/file\n```"
  id: https://repo.metadatacenter.org/template-fields/cdeec3a6-dc2f-40aa-80c8-4ffa26ef367b
  status: draft
  version: 0.0.1
  modelVersion: 1.6.0
  configuration:
    propertyIri: https://purl.org/radmo/sha256
- key: Description
  type: text-area-field
  name: Description
  description: An account of the contents of the Data File
  id: https://repo.metadatacenter.org/template-fields/0761fde6-71a1-4220-b86e-e3b855037914
  status: draft
  version: 0.0.1
  modelVersion: 1.6.0
  configuration:
    propertyIri: https://w3id.org/radx/radmo/description
- key: Identifier
  type: text-field
  name: Identifier
  description: |-
    A globally unique string that identifies the Data File being described. It is typically a DOI (Digital Object Identifier) or IRI (International Resource Identifier, or Web address). The identifier is typically generated by data providers or data publishers who wish to have a citable and Web-accessible resource.

    Example DOIs are `doi:10.1000/182` or `https://doi.org/10.1000/182`, both of which identify the DOI Handbook, which has a DOI of 10.1000/182

    See also:  [https://en.wikipedia.org/wiki/Digital_object_identifier](https://en.wikipedia.org/wiki/Digital_object_identifier)
  id: https://repo.metadatacenter.org/template-fields/df21839e-bc87-419f-84a7-d2b9da63e96d
  status: draft
  version: 0.0.1
  modelVersion: 1.6.0
  configuration:
    propertyIri: https://w3id.org/radx/radmo/identifier
- key: Primary Language
  type: single-select-list-field
  name: Primary Language
  description: Primary language used to present the data file (if multiple languages are present, the _Other Languages_ field may be used to add additional languages).
  id: https://repo.metadatacenter.org/template-fields/a2a691c4-2bbf-431d-af89-b0615bfdea00
  status: draft
  version: 0.0.1
  modelVersion: 1.6.0
  default: en
  values:
